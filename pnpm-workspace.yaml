allowBuilds:
  bcrypt: true
  esbuild: true
  sharp: true
  unrs-resolver: true

# Workaround for better-auth@1.6.x bug: @better-auth/kysely-adapter imports
# DEFAULT_MIGRATION_TABLE from 'kysely' main entry, but kysely@0.29 moved it
# to 'kysely/migration'. Pin to 0.28.x until better-auth ships the fix.
# See: https://github.com/better-auth/better-auth/issues/9810
overrides:
  kysely: "^0.28.17"
